<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f7f4; --bg2: #ffffff; --bg3: #f2f1ee; --bg4: #ece9e3;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
  --text: #1a1916; --text2: #6b6860; --text3: #a8a49e;
  --accent: #2a6b3c; --accent-light: #e8f4ec; --accent-mid: #c2dfc9;
  --red: #c0392b; --red-light: #fdf0ee;
  --blue: #2563a8; --blue-light: #edf3fb;
  --amber: #b45309; --amber-light: #fef3e2;
  --teal: #0d7377; --teal-light: #e6f4f4;
  --pink: #9d3d6e; --pink-light: #fbeef5;
  --orange: #c2410c; --orange-light: #fff1ec;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; font-size: 14px; min-height: 100vh; line-height: 1.6; }

/* LOGIN */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 44px 48px; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); }
.login-brand { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; color: var(--text); letter-spacing: -0.02em; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 36px; }
.login-error { background: var(--red-light); border: 1px solid rgba(192,57,43,0.15); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; }
.login-error.show { display: block; }

/* LAYOUT */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 230px; min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 10; overflow-y: auto; }
.main { margin-left: 230px; flex: 1; padding: 40px 44px; max-width: 1100px; }

.sidebar-brand { padding: 24px 22px 18px; border-bottom: 1px solid var(--border); }
.brand-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 400; color: var(--text); line-height: 1.2; letter-spacing: -0.02em; }
.brand-sub { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }

.sidebar-section { padding: 12px 12px 4px; }
.sidebar-section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all 0.12s; border: none; background: none; width: 100%; text-align: left; font-family: 'Geist', sans-serif; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.sidebar-user { padding: 10px 14px; margin: 0 12px 6px; background: var(--bg3); border-radius: var(--radius); display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 600; flex-shrink: 0; }
.user-email { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 2px 4px; border-radius: 4px; transition: color 0.12s; flex-shrink: 0; }
.logout-btn:hover { color: var(--red); }

.sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg3); }
.total-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; margin-bottom: 4px; }
.total-value { font-family: 'Fraunces', serif; font-size: 24px; color: var(--accent); font-weight: 400; letter-spacing: -0.02em; }
.total-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* PAGE */
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; gap: 16px; }
.page-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 400; color: var(--text); line-height: 1.1; letter-spacing: -0.02em; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 5px; }
.page-header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; flex-shrink: 0; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: none; font-family: 'Geist', sans-serif; transition: all 0.12s; font-weight: 500; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
.btn-primary:hover { background: #235c33; transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger { background: var(--red-light); color: var(--red); border: 1px solid rgba(192,57,43,0.15); }
.btn-danger:hover { background: #fbe5e3; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; padding: 11px 16px; font-size: 14px; }
.btn-icon { padding: 6px 8px; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 28px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow); transition: all 0.12s; }
.stat-card:hover { box-shadow: var(--shadow-md); border-color: var(--border2); }
.stat-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; margin-bottom: 6px; text-transform: uppercase; }
.stat-value { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 400; color: var(--text); letter-spacing: -0.02em; }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.stat-accent .stat-value { color: var(--accent); }

/* SECTION SEP */
.section-sep { display: flex; align-items: center; gap: 12px; margin: 24px 0 12px; }
.section-sep-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
.section-sep-line { flex: 1; height: 1px; background: var(--border); }
.section-sep-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* PROJECTS */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
.project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; box-shadow: var(--shadow); }
.project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, transparent); opacity: 0.6; }
.project-card:hover { box-shadow: var(--shadow-md); border-color: var(--border2); transform: translateY(-1px); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
.card-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
.card-linea { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 3px; }
.card-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.mini-metric { background: var(--bg3); border-radius: 6px; padding: 8px 10px; }
.mini-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 3px; }
.mini-value { font-size: 13px; font-weight: 500; color: var(--text); }
.mini-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.next-step-box { background: var(--accent-light); border-radius: 6px; padding: 8px 10px; }
.next-step-label { font-size: 10px; color: var(--accent); font-family: 'DM Mono', monospace; margin-bottom: 3px; letter-spacing: 0.04em; }
.next-step-text { font-size: 12px; color: var(--text2); }
.card-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; }

/* BADGES */
.badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; font-family: 'DM Mono', monospace; flex-shrink: 0; }
.badge-ejecucion { background: var(--teal-light); color: var(--teal); }
.badge-crecimiento { background: var(--blue-light); color: var(--blue); }
.badge-pausa { background: var(--bg3); color: var(--text3); }
.badge-venta { background: var(--amber-light); color: var(--amber); }
.badge-inversion { background: var(--pink-light); color: var(--pink); }
.badge-vencido { background: var(--red-light); color: var(--red); }
.badge-hoy { background: var(--orange-light); color: var(--orange); }
.badge-pronto { background: var(--amber-light); color: var(--amber); }

/* TRABAJOS MEJORADOS */
.filtros-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filtro-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.12s; }
.filtro-btn:hover { background: var(--bg3); color: var(--text2); }
.filtro-btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent-mid); }
.filtro-select { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; outline: none; }
.filtro-select:focus { border-color: var(--accent); }

.trabajos-list { display: flex; flex-direction: column; gap: 8px; }

.trabajo-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  transition: all 0.15s;
  overflow: hidden;
}
.trabajo-card:hover { box-shadow: var(--shadow-md); border-color: var(--border2); }
.trabajo-card.done { opacity: 0.45; }
.trabajo-card.vencido { border-left: 3px solid var(--red); }
.trabajo-card.hoy { border-left: 3px solid var(--orange); }
.trabajo-card.pronto { border-left: 3px solid var(--amber); }

.trabajo-main { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; }
.trabajo-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; background: transparent; margin-top: 1px; }
.trabajo-check:hover { border-color: var(--accent); }
.trabajo-check.checked { background: var(--accent); border-color: var(--accent); }
.trabajo-check.checked::after { content: '✓'; font-size: 10px; color: white; font-weight: 600; }

.trabajo-body { flex: 1; min-width: 0; }
.trabajo-titulo { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.trabajo-card.done .trabajo-titulo { text-decoration: line-through; color: var(--text3); }

.trabajo-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
.tag { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; white-space: nowrap; }

.trabajo-desc { font-size: 12px; color: var(--text2); margin-top: 5px; line-height: 1.5; }

.trabajo-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.trabajo-link { font-size: 11px; color: var(--blue); font-family: 'DM Mono', monospace; text-decoration: none; padding: 2px 7px; background: var(--blue-light); border-radius: 4px; transition: opacity 0.1s; }
.trabajo-link:hover { opacity: 0.75; }

.checklist-preview { margin-top: 8px; }
.checklist-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.checklist-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.checklist-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

.trabajo-side { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
.trabajo-imp { display: flex; gap: 2px; }
.imp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg4); }
.imp-dot.on { background: currentColor; }

.trabajo-actions-row { display: flex; gap: 4px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--bg3); }
.estado-select { background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; padding: 4px 8px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; cursor: pointer; outline: none; flex: 1; }
.estado-select:focus { border-color: var(--accent); }

/* CHECKLIST EN MODAL */
.checklist-items { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.checklist-item { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: 6px; padding: 7px 10px; }
.checklist-item-check { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; transition: all 0.12s; }
.checklist-item-check:hover { border-color: var(--accent); }
.checklist-item-check.done { background: var(--accent); border-color: var(--accent); }
.checklist-item-check.done::after { content: '✓'; font-size: 9px; color: white; font-weight: 700; }
.checklist-item-text { flex: 1; font-size: 13px; color: var(--text2); }
.checklist-item-text.done { text-decoration: line-through; color: var(--text3); }
.checklist-item-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0 3px; transition: color 0.1s; }
.checklist-item-del:hover { color: var(--red); }
.checklist-add { display: flex; gap: 8px; margin-top: 6px; }

/* LINKS EN MODAL */
.links-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.link-item { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: 6px; padding: 6px 10px; }
.link-item-url { flex: 1; font-size: 12px; color: var(--blue); font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.link-item-label { font-size: 12px; color: var(--text2); min-width: 80px; }
.link-item-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0 3px; transition: color 0.1s; }
.link-item-del:hover { color: var(--red); }
.link-add { display: grid; grid-template-columns: 2fr 1fr auto; gap: 6px; margin-top: 6px; }

/* VISTA SEMANAL */
.semana-grid { display: flex; flex-direction: column; gap: 16px; }
.dia-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
.dia-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.dia-nombre { font-size: 13px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
.dia-fecha { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.dia-hoy .dia-header { background: var(--accent-light); }
.dia-hoy .dia-nombre { color: var(--accent); }
.dia-trabajos { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
.dia-vacio { padding: 14px 18px; font-size: 12px; color: var(--text3); font-style: italic; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 26px 30px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; transform: translateY(8px); transition: transform 0.2s; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; margin-bottom: 20px; color: var(--text); letter-spacing: -0.02em; }

.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 8px 12px; font-size: 14px; color: var(--text); font-family: 'Geist', sans-serif; transition: border-color 0.12s; outline: none; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--bg2); }
.form-select option { background: var(--bg2); }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

.imp-selector { display: flex; gap: 5px; }
.imp-btn { flex: 1; padding: 7px 4px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg3); color: var(--text3); font-size: 11px; cursor: pointer; text-align: center; transition: all 0.12s; font-family: 'DM Mono', monospace; }
.imp-btn:hover { background: var(--bg4); }
.imp-btn.active-1 { background: var(--bg4); border-color: var(--text3); color: var(--text2); }
.imp-btn.active-2 { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.imp-btn.active-3 { background: var(--amber-light); border-color: var(--amber); color: var(--amber); }
.imp-btn.active-4 { background: var(--red-light); border-color: var(--red); color: var(--red); }

.subclient-list { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.subclient-item { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: 6px; padding: 6px 10px; }
.subclient-name { flex: 1; font-size: 13px; color: var(--text2); }
.subclient-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.1s; }
.subclient-del:hover { color: var(--red); }
.subclient-add { display: flex; gap: 8px; margin-top: 6px; }

.foco-item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.foco-rank { font-family: 'Fraunces', serif; font-size: 26px; color: var(--text3); min-width: 28px; text-align: right; line-height: 1; font-weight: 300; }
.foco-info { min-width: 170px; }
.foco-nombre { font-size: 14px; font-weight: 500; color: var(--text); }
.foco-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.foco-bar-wrap { flex: 1; }
.foco-bar-track { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.foco-bar-fill { height: 100%; border-radius: 2px; opacity: 0.7; }
.foco-ingreso { font-size: 12px; color: var(--text2); min-width: 100px; text-align: right; font-family: 'DM Mono', monospace; }

.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 18px; }
.detail-metric { background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; }
.detail-metric-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.05em; margin-bottom: 5px; text-transform: uppercase; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-icon { font-size: 26px; margin-bottom: 10px; opacity: 0.4; }
.empty-title { font-size: 15px; color: var(--text2); margin-bottom: 5px; font-family: 'Fraunces', serif; font-weight: 400; }
.empty-sub { font-size: 13px; }

.urgente-banner { background: var(--red-light); border: 1px solid rgba(192,57,43,0.15); border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 16px; }
.urgente-banner-label { font-size: 10px; color: var(--red); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

window.cambiarPassword = async function() {
  const nueva = document.getElementById('pw-nueva').value;
  const confirma = document.getElementById('pw-confirma').value;
  const errEl = document.getElementById('pw-error');
  errEl.classList.remove('show');

// ─── FIRESTORE ───────────────────────────────────────────────────────────────
function userCol(uid,col) { return collection(db,'users',uid,col); }
function userDoc(uid,col,id) { return doc(db,'users',uid,col,id); }

function subscribeData(uid) {
  if (unsubProyectos) unsubProyectos();
  if (unsubTrabajos) unsubTrabajos();
  if (unsubEstrategias) unsubEstrategias();
  unsubProyectos = onSnapshot(userCol(uid,'proyectos'), snap => {
    if (snap.empty && !state.initialized) {
      DEFAULT_PROYECTOS.forEach(p => setDoc(userDoc(uid,'proyectos',p.id),p));
      state.initialized=true; return;
    }
    state.proyectos=snap.docs.map(d=>d.data());
    state.proyectos.forEach(p=>{ if(!p.subclientes) p.subclientes=[]; });
    state.initialized=true;
    renderMain(); updateSidebar();
  });
  unsubTrabajos = onSnapshot(userCol(uid,'trabajos'), snap => {
    state.trabajos=snap.docs.map(d=>d.data());
    state.trabajos.forEach(t=>{ if(!t.importancia) t.importancia=2; if(!t.checklist) t.checklist=[]; if(!t.links) t.links=[]; });
    renderMain(); updateSidebar();
  });
  unsubEstrategias = onSnapshot(userCol(uid,'estrategias'), snap => {
    state.estrategias=snap.docs.map(d=>d.data());
    renderMain(); updateSidebar();
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmt(n) { if(!n||n===0) return '$0'; return '$'+Number(n).toLocaleString('es-AR'); }
function uid() { return 'x'+Date.now()+Math.random().toString(36).slice(2,6); }
function getTotalPersonal() { return state.proyectos.reduce((s,p)=>s+(p.ingresoPersonal||0),0); }

function focoScore(p) {
  let s=0; const ing=p.ingresoPersonal||0;
  if(ing>=400000) s+=4; else if(ing>=200000) s+=3; else if(ing>=100000) s+=2; else if(ing>0) s+=1;
  if(p.ingresoTipo==='pendiente') s+=3;
  if(p.potencial==='escalar') s+=2;
  if(p.estado==='crecimiento') s+=1;
  if(p.ejecuta==='yo') s+=1;
  return s;
}

function estadoLabel(e) { return {ejecucion:'En ejecución',crecimiento:'Creciendo',pausa:'Pausado',venta:'En venta',inversion:'Inversión'}[e]||e; }
function tEstadoLabel(e) { return {pendiente:'Pendiente',en_curso:'En curso',revision:'En revisión',entregado:'Entregado'}[e]||e; }
function tEstadoColor(e) { return {pendiente:'var(--text3)',en_curso:'var(--blue)',revision:'var(--amber)',entregado:'var(--teal)'}[e]||'var(--text3)'; }

function impDots(val) {
  const colors={1:'var(--text3)',2:'var(--blue)',3:'var(--amber)',4:'var(--red)'};
  let d='';
  for(let i=1;i<=4;i++) d+=`<span class="imp-dot${i<=val?' on':''}" style="${i<=val?'color:'+colors[val]:''}"></span>`;
  return `<span class="trabajo-imp" style="color:${colors[val]}">${d}</span>`;
}

function getVencimientoInfo(fecha) {
  if (!fecha) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const f = new Date(fecha+'T00:00:00');
  const diff = Math.round((f-hoy)/(1000*60*60*24));
  if (diff < 0) return { clase:'vencido', badge:'badge-vencido', texto:'Vencido hace '+Math.abs(diff)+'d' };
  if (diff === 0) return { clase:'hoy', badge:'badge-hoy', texto:'Vence hoy' };
  if (diff <= 3) return { clase:'pronto', badge:'badge-pronto', texto:'En '+diff+'d' };
  return { clase:'', badge:'', texto:fecha };
}

function sortTrabajos(lista) {
  return [...lista].sort((a,b) => {
    // Primero por fecha (sin fecha al final)
    const fa = a.fecha||'9999', fb = b.fecha||'9999';
    if (fa !== fb) return fa.localeCompare(fb);
    // Luego por importancia descendente
    return (b.importancia||1)-(a.importancia||1);
  });
}

function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }

function renderTrabajoCard(t, showProyecto) {
  const p=state.proyectos.find(x=>x.id===t.proyectoId);
  const isDone=t.estado==='entregado';
  const imp=t.importancia||2;
  const venc=getVencimientoInfo(t.fecha);
  const checkDone=t.checklist?t.checklist.filter(c=>c.done).length:0;
  const checkTotal=t.checklist?t.checklist.length:0;

  return `
  <div class="trabajo-card${isDone?' done':''}${venc&&!isDone?' '+venc.clase:''}">
    <div class="trabajo-main">
      <div class="trabajo-check${isDone?' checked':''}" onclick="toggleTrabajo('${t.id}')"></div>
      <div class="trabajo-body">

        <div class="trabajo-tags">

          <span class="imp-label-${imp}" style="font-size:11px;font-family:'DM Mono',monospace;">${IMP_LABELS[imp]}</span>
          <span style="font-size:11px;color:${tEstadoColor(t.estado)};font-family:'DM Mono',monospace;">${tEstadoLabel(t.estado)}</span>
          ${venc&&!isDone?`<span class="badge ${venc.badge}">${venc.texto}</span>`:''}
          ${showProyecto&&p?`<span class="tag" style="background:${LINEA_COLORS[p.linea]}12;color:${LINEA_COLORS[p.linea]};border:1px solid ${LINEA_COLORS[p.linea]}25;">${p.nombre}</span>`:''}
          ${t.cliente?`<span class="tag" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">${t.cliente}</span>`:''}
          ${t.asignado?`<span class="tag" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border);">→ ${t.asignado}</span>`:''}
          ${t.monto?`<span class="tag" style="background:var(--accent-light);color:var(--accent);">${fmt(t.monto)}</span>`:''}
        </div>
        ${t.descripcion?`<div class="trabajo-desc">${t.descripcion}</div>`:''}
        ${t.links&&t.links.length?`<div class="trabajo-links">${t.links.map(l=>`<a class="trabajo-link" href="${l.url}" target="_blank">${l.label||l.url}</a>`).join('')}</div>`:''}
        ${checkTotal>0?`<div class="checklist-preview"><div class="checklist-bar"><div class="checklist-fill" style="width:${Math.round((checkDone/checkTotal)*100)}%"></div></div><div class="checklist-label">${checkDone}/${checkTotal} tareas completadas</div></div>`:''}
      </div>
    </div>
    <div class="trabajo-actions-row">
      <select class="estado-select" onchange="updateTrabajoEstado('${t.id}',this.value)">
        <option value="pendiente"${t.estado==='pendiente'?' selected':''}>Pendiente</option>
        <option value="en_curso"${t.estado==='en_curso'?' selected':''}>En curso</option>
        <option value="revision"${t.estado==='revision'?' selected':''}>En revisión</option>
        <option value="entregado"${t.estado==='entregado'?' selected':''}>Entregado</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="openModalTrabajo('${t.id}')">Editar</button>
      ${checkTotal>0?`<button class="btn btn-ghost btn-sm" onclick="toggleChecklist('${t.id}')">Checklist</button>`:''}
    </div>
  </div>`;
}

// ─── VISTA SEMANAL ───────────────────────────────────────────────────────────
function renderSemana() {
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const dias=[];
  for(let i=0;i<7;i++) {
    const d=new Date(hoy); d.setDate(hoy.getDate()+i);
    dias.push(d);
  }

  const sinFecha=sortTrabajos(state.trabajos.filter(t=>t.estado!=='entregado'&&!t.fecha));
  const vencidos=sortTrabajos(state.trabajos.filter(t=>t.estado!=='entregado'&&t.fecha&&new Date(t.fecha+'T00:00:00')<hoy));

  let html=`
  <div class="page-header">
    <div><div class="page-title">Esta semana</div><div class="page-sub">Trabajos por día · próximos 7 días</div></div>
    <button class="btn btn-primary" onclick="openModalTrabajo()">+ Nuevo trabajo</button>
  </div>`;

  if(vencidos.length>0) {
    html+=`<div class="urgente-banner"><div class="urgente-banner-label">VENCIDOS — REQUIEREN ATENCIÓN</div><div class="trabajos-list">${vencidos.map(t=>renderTrabajoCard(t,true)).join('')}</div></div>`;
  }

  html+=`<div class="semana-grid">`;
  dias.forEach(d=>{
    const fechaStr=d.toISOString().split('T')[0];
    const esHoy=d.getTime()===hoy.getTime();
    const trabajosDia=sortTrabajos(state.trabajos.filter(t=>t.estado!=='entregado'&&t.fecha===fechaStr));
    html+=`
    <div class="dia-block${esHoy?' dia-hoy':''}">
      <div class="dia-header">
        <div class="dia-nombre">${DIAS[d.getDay()]}${esHoy?' · Hoy':''}</div>
        <div class="dia-fecha">${d.toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>
      </div>
      ${trabajosDia.length>0?`<div class="dia-trabajos">${trabajosDia.map(t=>renderTrabajoCard(t,true)).join('')}</div>`:`<div class="dia-vacio">Sin trabajos para este día</div>`}
    </div>`;
  });
  html+=`</div>`;

  if(sinFecha.length>0) {
    html+=`<div class="section-sep" style="margin-top:20px;"><span class="section-sep-label">SIN FECHA ASIGNADA (${sinFecha.length})</span><div class="section-sep-line"></div></div><div class="trabajos-list">${sinFecha.map(t=>renderTrabajoCard(t,true)).join('')}</div>`;
  }

  return html;
}

// ─── ESTRATEGIA ──────────────────────────────────────────────────────────────
function renderEstrategia() {
  const TIPO_LABELS = { reunion:'Reunión', propuesta:'Propuesta', decision:'Decisión', seguimiento:'Seguimiento', otro:'Otro' };
  const PRIORIDAD_COLORS = { normal:'var(--text3)', alta:'var(--amber)', urgente:'var(--red)' };
  const TIPO_BADGE = { reunion:'badge-estrategia-reunion', propuesta:'badge-estrategia-propuesta', decision:'badge-estrategia-decision', seguimiento:'badge-estrategia-seguimiento', otro:'badge-estrategia-otro' };

  const pendientes = state.estrategias.filter(e=>!e.resuelta).sort((a,b)=>{
    const orden = { urgente:0, alta:1, normal:2 };
    if((orden[a.prioridad]||2)!==(orden[b.prioridad]||2)) return (orden[a.prioridad]||2)-(orden[b.prioridad]||2);
    return (a.fecha||'9999').localeCompare(b.fecha||'9999');
  });
  const resueltas = state.estrategias.filter(e=>e.resuelta);

  const renderCard = (e) => {
    const p = e.proyectoId ? state.proyectos.find(x=>x.id===e.proyectoId) : null;
    const venc = getVencimientoInfo(e.fecha);
    const color = p ? LINEA_COLORS[p.linea] : 'var(--pink)';
    return `
    <div class="estrategia-card${e.resuelta?' resuelta':''}" style="--est-color:${color}">
      <div class="est-header">
        <div class="est-titulo">${e.titulo}</div>
        <div class="est-check${e.resuelta?' checked':''}" onclick="toggleEstrategia('${e.id}')"></div>
      </div>
      <div class="est-tags">
        <span class="badge ${TIPO_BADGE[e.tipo]||'badge-estrategia-otro'}">${TIPO_LABELS[e.tipo]||'Otro'}</span>
        ${e.prioridad&&e.prioridad!=='normal'?`<span style="font-size:11px;color:${PRIORIDAD_COLORS[e.prioridad]};font-family:'DM Mono',monospace;font-weight:500;">${e.prioridad==='urgente'?'URGENTE':'ALTA'}</span>`:''}
        ${venc&&!e.resuelta?`<span class="badge ${venc.badge}">${venc.texto}</span>`:''}
        ${p?`<span class="tag" style="background:${color}12;color:${color};border:1px solid ${color}25;">${p.nombre}</span>`:''}
      </div>
      ${e.descripcion?`<div class="est-desc">${e.descripcion}</div>`:''}
      ${e.resultado?`<div style="font-size:12px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:6px;">→ ${e.resultado}</div>`:''}
      <div class="est-actions">
        <button class="btn btn-ghost btn-sm" onclick="openModalEstrategia('${e.id}')">Editar</button>
      </div>
    </div>`;
  };

  return `
  <div class="page-header">
    <div><div class="page-title">Estrategia</div><div class="page-sub">Decisiones, reuniones y acciones de negocio · ${pendientes.length} pendientes</div></div>
    <button class="btn btn-primary" onclick="openModalEstrategia()">+ Nueva acción</button>
  </div>
  ${pendientes.filter(e=>e.prioridad==='urgente').length>0?`
  <div class="urgente-banner">
    <div class="urgente-banner-label">URGENTES</div>
    <div style="display:flex;flex-direction:column;gap:8px;">${pendientes.filter(e=>e.prioridad==='urgente').map(e=>renderCard(e)).join('')}</div>
  </div>`:''}
  ${pendientes.length===0?`<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-title">Sin acciones estratégicas</div><div class="empty-sub">Agregá reuniones, decisiones y propuestas de negocio</div></div>`:''}
  ${pendientes.filter(e=>e.prioridad!=='urgente').length>0?`<div style="display:flex;flex-direction:column;gap:8px;">${pendientes.filter(e=>e.prioridad!=='urgente').map(e=>renderCard(e)).join('')}</div>`:''}
  ${resueltas.length>0?`
  <div class="section-sep" style="margin-top:20px;"><span class="section-sep-label">RESUELTAS (${resueltas.length})</span><div class="section-sep-line"></div></div>
  <div style="display:flex;flex-direction:column;gap:8px;">${resueltas.map(e=>renderCard(e)).join('')}</div>`:''}`;
}

window.toggleEstrategia = async function(id) {
  const e = state.estrategias.find(x=>x.id===id);
  if(e) { e.resuelta=!e.resuelta; await saveE(e); }
}

window.openModalEstrategia = function(editId) {
  state.editingEstrategiaId = editId||null;
  document.getElementById('modal-estrategia-title').textContent = editId ? 'Editar acción estratégica' : 'Nueva acción estratégica';
  document.getElementById('btn-delete-estrategia').style.display = editId ? 'block' : 'none';

  // Populate proyecto select
  const sel = document.getElementById('e-proyecto');
  sel.innerHTML = '<option value="">— General, sin proyecto —</option>' +
    state.proyectos.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');

  if(editId) {
    const e = state.estrategias.find(x=>x.id===editId);
    if(e) {
      document.getElementById('e-titulo').value=e.titulo;
      document.getElementById('e-tipo').value=e.tipo||'reunion';
      document.getElementById('e-fecha').value=e.fecha||'';
      document.getElementById('e-prioridad').value=e.prioridad||'normal';
      document.getElementById('e-proyecto').value=e.proyectoId||'';
      document.getElementById('e-descripcion').value=e.descripcion||'';
      document.getElementById('e-resultado').value=e.resultado||'';
    }
  } else {
    ['e-titulo','e-fecha','e-descripcion','e-resultado'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('e-tipo').value='reunion';
    document.getElementById('e-prioridad').value='normal';
    document.getElementById('e-proyecto').value='';
  }
  openModal('modal-estrategia');
}

window.deleteEstrategiaFromModal = async function() {
  if(!state.editingEstrategiaId) return;
  if(!confirm('¿Eliminar esta acción estratégica?')) return;
  await deleteE(state.editingEstrategiaId);
  closeModal('modal-estrategia'); toast('Acción eliminada');
}

window.saveEstrategia = async function() {
  const titulo = document.getElementById('e-titulo').value.trim();
  if(!titulo) { alert('El título es obligatorio'); return; }
  const data = {
    titulo,
    tipo: document.getElementById('e-tipo').value,
    fecha: document.getElementById('e-fecha').value,
    prioridad: document.getElementById('e-prioridad').value,
    proyectoId: document.getElementById('e-proyecto').value||'',
    descripcion: document.getElementById('e-descripcion').value,
    resultado: document.getElementById('e-resultado').value,
  };
  if(state.editingEstrategiaId) {
    const e = state.estrategias.find(x=>x.id===state.editingEstrategiaId);
    await saveE({...e,...data}); toast('Acción actualizada');
  } else {
    await saveE({id:uid(), resuelta:false, creado:new Date().toISOString(),...data}); toast('Acción agregada');
  }
  closeModal('modal-estrategia');
}

function renderSubclientesList() {
  const list=document.getElementById('f-subclientes-list'); if(!list) return;
  list.innerHTML=state.tempSubclientes.map((sc,i)=>`<div class="subclient-item"><span class="subclient-name">${sc}</span><button class="subclient-del" onclick="removeSubcliente(${i})">✕</button></div>`).join('');
}
window.addSubcliente=function(){const input=document.getElementById('f-subclient-input');const val=input.value.trim();if(!val)return;state.tempSubclientes.push(val);input.value='';renderSubclientesList();}
window.removeSubcliente=function(i){state.tempSubclientes.splice(i,1);renderSubclientesList();}
document.getElementById('f-subclient-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addSubcliente();}});

window.openModal=function(id){document.getElementById(id).classList.add('open');}
window.closeModal=function(id){document.getElementById(id).classList.remove('open');}

window.openModalProyecto=function(lineaDefault,editId){
  state.editingProyectoId=editId||null;
  document.getElementById('modal-proyecto-title').textContent=editId?'Editar proyecto':'Nuevo proyecto';
  if(editId){
    const p=state.proyectos.find(x=>x.id===editId);

      document.getElementById('f-nombre').value=p.nombre;

      document.getElementById('f-estado').value=p.estado;
      document.getElementById('f-ingreso').value=p.ingresoPersonal||'';
      document.getElementById('f-ingreso-tipo').value=p.ingresoTipo||'fijo';
      document.getElementById('f-tiempo').value=p.tiempo;
      document.getElementById('f-energia').value=p.energia;
      document.getElementById('f-ejecuta').value=p.ejecuta;
      document.getElementById('f-potencial').value=p.potencial;
      document.getElementById('f-proximo').value=p.proximoPaso;
      document.getElementById('f-notas').value=p.notas||'';
      document.getElementById('f-sociedad').value=p.sociedad?'true':'false';
      document.getElementById('f-sociedad-ingreso').value=p.ingresoSociedad||'';

    document.getElementById('f-estado').value='ejecucion';
    document.getElementById('f-ingreso-tipo').value='fijo';
    document.getElementById('f-energia').value='media';
    document.getElementById('f-ejecuta').value='yo';
    document.getElementById('f-potencial').value='escalar';
    document.getElementById('f-sociedad').value=lineaDefault==='bajolasuela'?'true':'false';
    document.getElementById('f-sociedad-ingreso-group').style.display=lineaDefault==='bajolasuela'?'block':'none';
    state.tempSubclientes=[];
  }
  renderSubclientesList(); openModal('modal-proyecto');
}

document.getElementById('f-sociedad').addEventListener('change',function(){
  document.getElementById('f-sociedad-ingreso-group').style.display=this.value==='true'?'block':'none';
});

window.editProyecto=function(id){openModalProyecto(null,id);}

window.saveProyecto=async function(){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){alert('El nombre es obligatorio');return;}
  const ingreso=parseFloat(document.getElementById('f-ingreso').value)||0;
  const sociedad=document.getElementById('f-sociedad').value==='true';
  const tipo=document.getElementById('f-ingreso-tipo').value;
  const data={
    nombre,linea:document.getElementById('f-linea').value,
    estado:document.getElementById('f-estado').value,
    ingresoPersonal:ingreso,
    ingresoLabel:ingreso>0?fmt(ingreso):tipo==='pendiente'?'Próximamente':tipo==='inversion'?'Inversión':'Variable',
    ingresoTipo:tipo,sociedad,
    ingresoSociedad:sociedad?parseFloat(document.getElementById('f-sociedad-ingreso').value)||0:0,
    tiempo:document.getElementById('f-tiempo').value||'—',
    energia:document.getElementById('f-energia').value,
    ejecuta:document.getElementById('f-ejecuta').value,
    potencial:document.getElementById('f-potencial').value,
    proximoPaso:document.getElementById('f-proximo').value||'—',
    notas:document.getElementById('f-notas').value,
    subclientes:[...state.tempSubclientes],
  };
  if(state.editingProyectoId){
    const idx=state.proyectos.findIndex(p=>p.id===state.editingProyectoId);
    const updated=idx!==-1?{...state.proyectos[idx],...data}:{id:state.editingProyectoId,...data};
    await saveP(updated); toast('Proyecto actualizado');
  } else {
    await saveP({id:uid(),...data}); toast('Proyecto creado');
  }
  closeModal('modal-proyecto');
}

window.deleteProyecto=async function(id){
  if(!confirm('¿Eliminar este proyecto y sus trabajos?'))return;
  const tp=state.trabajos.filter(t=>t.proyectoId===id);
  await Promise.all(tp.map(t=>deleteT(t.id)));
  await deleteP(id);
  navigate('dashboard'); toast('Proyecto eliminado');
}

// ─── MODAL TRABAJO ───────────────────────────────────────────────────────────
function renderChecklistModal() {
  const list=document.getElementById('t-checklist-list'); if(!list) return;
  list.innerHTML=state.tempChecklist.map((item,i)=>`
    <div class="checklist-item">
      <div class="checklist-item-check${item.done?' done':''}" onclick="toggleChecklistModal(${i})"></div>
      <span class="checklist-item-text${item.done?' done':''}">${item.text}</span>
      <button class="checklist-item-del" onclick="removeChecklistItem(${i})">✕</button>
    </div>`).join('');
}

function renderLinksModal() {
  const list=document.getElementById('t-links-list'); if(!list) return;
  list.innerHTML=state.tempLinks.map((link,i)=>`
    <div class="link-item">
      <span class="link-item-label">${link.label||'Link'}</span>
      <span class="link-item-url">${link.url}</span>
      <button class="link-item-del" onclick="removeLink(${i})">✕</button>

}

window.addChecklistItem=function(){
  const input=document.getElementById('t-checklist-input');
  const val=input.value.trim(); if(!val) return;
  state.tempChecklist.push({text:val,done:false}); input.value=''; renderChecklistModal();
}
window.removeChecklistItem=function(i){state.tempChecklist.splice(i,1);renderChecklistModal();}
window.toggleChecklistModal=function(i){state.tempChecklist[i].done=!state.tempChecklist[i].done;renderChecklistModal();}
document.getElementById('t-checklist-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addChecklistItem();}});

window.addLink=function(){
  const url=document.getElementById('t-link-url').value.trim();
  if(!url) return;
  const label=document.getElementById('t-link-label').value.trim();
  state.tempLinks.push({url,label}); 
  document.getElementById('t-link-url').value='';
  document.getElementById('t-link-label').value='';
  renderLinksModal();
}
window.removeLink=function(i){state.tempLinks.splice(i,1);renderLinksModal();}

window.setImportancia=function(val){
  currentImportancia=val;
  document.querySelectorAll('.imp-btn').forEach(b=>{b.classList.remove('active-1','active-2','active-3','active-4');if(parseInt(b.dataset.val)===val)b.classList.add('active-'+val);});
}

window.onProyectoChange=function(){
  const p=state.proyectos.find(x=>x.id===document.getElementById('t-proyecto').value);
  const sel=document.getElementById('t-cliente');
  sel.innerHTML='<option value="">— Sin especificar —</option>';
  if(p&&p.subclientes&&p.subclientes.length) p.subclientes.forEach(sc=>{const o=document.createElement('option');o.value=sc;o.textContent=sc;sel.appendChild(o);});
}

// editId = id del trabajo a editar, proyectoId = proyecto preseleccionado para nuevo
window.openModalTrabajo=function(editId,proyectoIdDefault){
  state.editingTrabajoId=editId||null;
  document.getElementById('modal-trabajo-title').textContent=editId?'Editar trabajo':'Nuevo trabajo';
  document.getElementById('btn-delete-trabajo').style.display=editId?'block':'none';

  const sel=document.getElementById('t-proyecto');
  sel.innerHTML=state.proyectos.map(p=>`<option value="${p.id}"${p.id===proyectoIdDefault?' selected':''}>${p.nombre}</option>`).join('');

  if(editId){
    const t=state.trabajos.find(x=>x.id===editId);
    if(t){
      document.getElementById('t-nombre').value=t.nombre;
      document.getElementById('t-descripcion').value=t.descripcion||'';
      document.getElementById('t-estado').value=t.estado;
      document.getElementById('t-fecha').value=t.fecha||'';
      document.getElementById('t-monto').value=t.monto||'';
      document.getElementById('t-asignado').value=t.asignado||'';
      sel.value=t.proyectoId;
      onProyectoChange();
      document.getElementById('t-cliente').value=t.cliente||'';
      currentImportancia=t.importancia||2;
      state.tempChecklist=JSON.parse(JSON.stringify(t.checklist||[]));
      state.tempLinks=JSON.parse(JSON.stringify(t.links||[]));
    }
  } else {
    ['t-nombre','t-descripcion','t-fecha','t-monto','t-asignado'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('t-estado').value='pendiente';
    currentImportancia=2;
    state.tempChecklist=[];
    state.tempLinks=[];
    onProyectoChange();
  }

  document.querySelectorAll('.imp-btn').forEach(b=>{b.classList.remove('active-1','active-2','active-3','active-4');if(parseInt(b.dataset.val)===currentImportancia)b.classList.add('active-'+currentImportancia);});
  renderChecklistModal(); renderLinksModal();
  openModal('modal-trabajo');
}

window.deleteTrabajoFromModal=async function(){
  if(!state.editingTrabajoId)return;
  if(!confirm('¿Eliminar este trabajo?'))return;
  await deleteT(state.editingTrabajoId);
  closeModal('modal-trabajo'); toast('Trabajo eliminado');
}

window.saveTrabajo=async function(){
  const nombre=document.getElementById('t-nombre').value.trim();
  if(!nombre){alert('El título es obligatorio');return;}
  const data={
    proyectoId:document.getElementById('t-proyecto').value,
    cliente:document.getElementById('t-cliente').value||'',
    nombre,
    descripcion:document.getElementById('t-descripcion').value,
    estado:document.getElementById('t-estado').value,

    fecha:document.getElementById('t-fecha').value,
    monto:parseFloat(document.getElementById('t-monto').value)||0,
    asignado:document.getElementById('t-asignado').value,
    checklist:JSON.parse(JSON.stringify(state.tempChecklist)),
    links:JSON.parse(JSON.stringify(state.tempLinks)),
  };
  if(state.editingTrabajoId){
    const t=state.trabajos.find(x=>x.id===state.editingTrabajoId);
    await saveT({...t,...data}); toast('Trabajo actualizado');
  } else {
    await saveT({id:uid(),creado:new Date().toISOString(),...data}); toast('Trabajo agregado');
  }
  closeModal('modal-trabajo');
}

window.toggleTrabajo=async function(id){
  const t=state.trabajos.find(x=>x.id===id);
  if(t){t.estado=t.estado==='entregado'?'pendiente':'entregado';await saveT(t);}
}

  const t=state.trabajos.find(x=>x.id===id);
  if(t){t.estado=estado;await saveT(t);}
}

window.toggleChecklist=function(id){
  // Abre el trabajo en edición para ver el checklist completo
  openModalTrabajo(id);
}
